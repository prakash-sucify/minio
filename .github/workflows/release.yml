# Build MinIO from source and publish to GitHub Container Registry.
# No dependency on dl.min.io; supply-chain continuity for the community fork.
# Triggers: push tag v* or RELEASE.*, or manual workflow_dispatch.

name: Release (build from source)

on:
  push:
    tags:
      - 'v*'
      - 'RELEASE.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. RELEASE.2025-12-03T12-00-00Z)'
        required: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-binaries:
    name: Build binaries
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'
          cache-dependency-path: go.sum

      - name: Set version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Build Linux amd64
        env:
          CGO_ENABLED: 0
          GOOS: linux
          GOARCH: amd64
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          VERSION="${VERSION#RELEASE.}"
          # gen-ldflags expects timestamp (2006-01-02T15-04-05Z); for v* tags use git commit time
          if echo "${VERSION}" | grep -qE '^[0-9]{4}-[0-9]{2}-[0-9]{2}T'; then
            LDFLAGS=$(go run buildscripts/gen-ldflags.go "${VERSION}")
          else
            LDFLAGS=$(go run buildscripts/gen-ldflags.go)
          fi
          go build -trimpath -tags kqueue -ldflags "${LDFLAGS}" -o minio-linux-amd64 ./cmd
          sha256sum minio-linux-amd64 > minio-linux-amd64.sha256sum

      - name: Build Linux arm64
        env:
          CGO_ENABLED: 0
          GOOS: linux
          GOARCH: arm64
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          VERSION="${VERSION#RELEASE.}"
          if echo "${VERSION}" | grep -qE '^[0-9]{4}-[0-9]{2}-[0-9]{2}T'; then
            LDFLAGS=$(go run buildscripts/gen-ldflags.go "${VERSION}")
          else
            LDFLAGS=$(go run buildscripts/gen-ldflags.go)
          fi
          go build -trimpath -tags kqueue -ldflags "${LDFLAGS}" -o minio-linux-arm64 ./cmd
          sha256sum minio-linux-arm64 > minio-linux-arm64.sha256sum

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: |
            minio-linux-amd64
            minio-linux-amd64.sha256sum
            minio-linux-arm64
            minio-linux-arm64.sha256sum

  docker:
    name: Build and push Docker image
    needs: build-binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU and buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata and build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.build
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/minio:${{ needs.build-binaries.outputs.version }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/minio:latest
          build-args: |
            RELEASE=${{ needs.build-binaries.outputs.version }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Create GitHub Release
    needs: build-binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: binaries

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build-binaries.outputs.version }}
          name: MinIO ${{ needs.build-binaries.outputs.version }} (community fork)
          draft: false
          files: |
            minio-linux-amd64
            minio-linux-amd64.sha256sum
            minio-linux-arm64
            minio-linux-arm64.sha256sum
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
